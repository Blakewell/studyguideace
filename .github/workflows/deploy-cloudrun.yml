name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment target environment'
        required: true
        default: Dev
        type: choice
        options:
          - Dev
          - Prod

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: us-central1
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment || 'Prod' }}
  API_SERVICE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'Dev' && 'studyguideace-api-dev' || 'studyguideace-api-prod' }}
  UI_SERVICE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'Dev' && 'studyguideace-ui-dev' || 'studyguideace-ui-prod' }}
  API_IMAGE: ${{ format('us-central1-docker.pkg.dev/{0}/studyguideace-api/{1}', secrets.GCP_PROJECT, github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'Dev' && 'studyguideace-api-dev' || 'studyguideace-api-prod') }}
  UI_IMAGE: ${{ format('us-central1-docker.pkg.dev/{0}/studyguideace-ui/{1}', secrets.GCP_PROJECT, github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'Dev' && 'studyguideace-ui-dev' || 'studyguideace-ui-prod') }}

jobs:
  deploy:
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment || 'Prod' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          export_default_credentials: true

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.6.0'

      - name: Terraform init
        working-directory: .tf
        run: terraform init

      - name: Terraform apply
        working-directory: .tf
        run: terraform apply -auto-approve -var="project_id=${{ env.GCP_PROJECT }}" -var="region=${{ env.GCP_REGION }}"

      - name: Build API image
        run: |
          docker build -t "$API_IMAGE" ./app/api

      - name: Build UI image
        run: |
          docker build -t "$UI_IMAGE" ./app/ui

      - name: Push API image
        run: |
          docker push "$API_IMAGE"

      - name: Push UI image
        run: |
          docker push "$UI_IMAGE"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "$API_SERVICE" \
            --image "$API_IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy "$UI_SERVICE" \
            --image "$UI_IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated
